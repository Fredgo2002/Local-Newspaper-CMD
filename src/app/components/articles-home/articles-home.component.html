<div class="container-fluid p-0">
    <div class="header">
        <span class="label mx-4">Dashboard Overview</span>
        <mat-form-field style="width: 1000px;" class="white-bg-form-field" appearance="outline"
            class="search-form-field">
            <mat-icon matPrefix>search</mat-icon>
            <input matInput placeholder="Search" (keyup)="search()">
        </mat-form-field>
    </div>
    <div class="body">
        <span class="subtitle mb-4">Articles</span>
        <div class="d-flex justify-content-between">
            <mat-form-field class="white-bg-form-field" appearance="outline">
                <mat-select (selectionChange)="filterArticles($event.value)" [(value)]="selectedCategory">
                    <mat-option [value]="articlesCategories.published"
                        class="custom-text">{{articlesCategories.published}}</mat-option>
                    <mat-option [value]="articlesCategories.unpublished"
                        class="custom-text">{{articlesCategories.unpublished}}</mat-option>
                    <mat-option [value]="articlesCategories.all"
                        class="custom-text">{{articlesCategories.all}}</mat-option>
                </mat-select>
            </mat-form-field>
            <button mat-button class="custom-button" (click)="openSidePaneAdd()">
                <mat-icon>add</mat-icon>
                <span class="custom-text">ADD ARTICLE</span>
            </button>
        </div>
        <div class="articles-container">
            <table mat-table [dataSource]="articles">
                <ng-container matColumnDef="headline">
                    <th mat-header-cell *matHeaderCellDef> Article Headline </th>
                    <td mat-cell *matCellDef="let article"> {{article.headline}} </td>
                </ng-container>
                <ng-container matColumnDef="author">
                    <th mat-header-cell *matHeaderCellDef> Author </th>
                    <td mat-cell *matCellDef="let article"> {{article.author}} </td>
                </ng-container>
                <ng-container matColumnDef="publication_date">
                    <th mat-header-cell *matHeaderCellDef> Publish Date </th>
                    <td mat-cell *matCellDef="let article"> {{article.publication_date}} </td>
                </ng-container>
                <ng-container matColumnDef="published">
                    <th mat-header-cell *matHeaderCellDef> Published </th>
                    <td mat-cell *matCellDef="let article">
                        <mat-slide-toggle [(ngModel)]="article.published" class="custom-slide-toggle"
                            (change)="publishArticle(article)"></mat-slide-toggle>
                    </td>
                </ng-container>
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef></th>
                    <td mat-cell *matCellDef="let article; let i = index">
                        <button mat-icon-button cdkOverlayOrigin #trigger="cdkOverlayOrigin" (click)="toggleMenu(i)">
                            <mat-icon>more_horiz</mat-icon>
                        </button>
                        <ng-template cdkConnectedOverlay [cdkConnectedOverlayOrigin]="trigger"
                            [cdkConnectedOverlayOpen]="openMenuIndex === i" [cdkConnectedOverlayHasBackdrop]="true"
                            (backdropClick)="openMenuIndex = null">
                            <div class="overlay-panel">
                                <ul class="options-list">
                                    <li>
                                        <button (click)="openSidePaneEdit(article)">
                                            <mat-icon>edit</mat-icon>
                                            <span>Edit</span>
                                        </button>
                                    </li>
                                    <li>
                                        <button (click)="openSidePaneView(article)">
                                            <mat-icon>visibility</mat-icon>
                                            <span>View</span>
                                        </button>
                                    </li>
                                    <li style="border-top: 1px solid rgba(0, 0, 0, 0.1);">
                                        <button (click)="deleteArticle(article)">
                                            <mat-icon>delete</mat-icon>
                                            <span>Delete</span>
                                        </button>
                                    </li>
                                </ul>
                            </div>
                        </ng-template>
                    </td>
                </ng-container>
                <tr mat-header-row
                    *matHeaderRowDef="['headline', 'author', 'publication_date', 'published', 'actions']"></tr>
                <tr mat-row
                    *matRowDef="let row; columns: ['headline', 'author', 'publication_date', 'published', 'actions'];">
                </tr>
            </table>
            <mat-paginator [length]="articles.length" [pageSize]="10" [pageSizeOptions]="[5, 10, 15]"
                aria-label="Select page">
            </mat-paginator>
            <div cdkOverlayOrigin #sidePaneOrigin="cdkOverlayOrigin"></div>
        </div>

    </div>
    <app-side-pane [isOpen]="isOpenSidePane" [mode]="mode" [selectedArticle]="selectedArticle"
        [articleForm]="articleForm" [sidePaneOrigin]="sidePaneOrigin" (close)="closeSidePane()" (save)="saveArticle()"
        (publish)="publishArticle($event)">
    </app-side-pane>
</div>
