<div class="sidebar">
    <div class="sidebar-logo">
        <img src="assets/logo/senirop_logo.png" alt="Logo">
    </div>
    <ul>
        <li *ngFor="let item of menuItems">
            <a [routerLink]="item.url">{{ item.label }}</a>
        </li>
    </ul>
    <div class="logout-section">
        <button class="logout-button">
            <span>Logout</span>
        </button>
    </div>
</div>
